  summary: Définit un contrat pour les types capables de s'initialiser via une méthode de fabrique statique.
  remarks: >-
    Nécessite .NET 7+ (C# 11) pour le support des membres statiques abstraits en interface.

    Le paramètre <code class="typeparamref">TSelf</code> suit le pattern CRTP (Curiously Recurring Template Pattern) :

    le type implémentant doit se passer lui-même en argument, garantissant que <code>Start</code>

    retourne bien le type concret et non un type de base.
