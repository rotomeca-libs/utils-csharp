  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils
  summary: >-
    Applique une fonction de transformation à la valeur courante

    et retourne le résultat encapsulé dans un <xref href="Rotomeca.Utils.Functional.PipeObject%601" data-throw-if-not-resolved="false"></xref>.
  example:
  - >-
    <pre><code class="lang-csharp">// Syntaxe idiomatique C#

    string result = "  hello world  "
        .Pipe(s =&gt; s.Trim())
        .Pipe(s =&gt; s.ToUpper());
    // result == "HELLO WORLD"</code></pre>
  syntax:
    content: public static PipeObject<TResult> Pipe<T, TResult>(this T value, Func<T, TResult> fn)
    parameters:
    - id: value
      type: '{T}'
      description: Valeur sur laquelle la transformation est appliquée.
    - id: fn
      type: System.Func{{T},{TResult}}
      description: Fonction de transformation à appliquer.
    typeParameters:
    - id: T
      description: Type de la valeur source.
    - id: TResult
      description: Type du résultat produit par <code class="paramref">fn</code>.
    return:
      type: Rotomeca.Utils.Functional.PipeObject{{TResult}}
      description: >-
        Un <xref href="Rotomeca.Utils.Functional.PipeObject%601" data-throw-if-not-resolved="false"></xref> encapsulant le résultat,

        permettant de chaîner d'autres transformations.
    content.vb: Public Shared Function Pipe(Of T, TResult)(value As T, fn As Func(Of T, TResult)) As PipeObject(Of TResult)
