  namespace: Rotomeca.Utils.Async.Helpers
  summary: Représente un nombre de tentatives garanti dans l'intervalle [1, <xref href="System.UInt32.MaxValue" data-throw-if-not-resolved="false"></xref>].
  remarks: >-
    <p>

    Toute valeur inférieure à 1 est automatiquement clampée à 1 —

    il est impossible de créer une instance avec 0 tentatives.

    </p>

    <p>

    Les conversions implicites depuis et vers <xref href="System.UInt32" data-throw-if-not-resolved="false"></xref> permettent

    une utilisation transparente aux points d'appel.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">AttemptNumber attempts = 3;

    AttemptNumber zero     = 0; // clampée à 1 silencieusement


    await Asynchronous.Retry(fn, attempts, delay: 500);</code></pre>
  syntax:
    content: 'public readonly struct AttemptNumber : IClampedValue<uint>'
    content.vb: Public Structure AttemptNumber Implements IClampedValue(Of UInteger)
