  namespace: Rotomeca.Utils
  summary: Fournit des expressions régulières précompilées au premier accès via <code>RegexOptions.Compiled</code>.
  remarks: >-
    Sur .NET 7+, les regex sont générées statiquement par le compilateur (source generator) :

    aucun overhead au démarrage, les erreurs de pattern sont détectées à la compilation.

    Sur NETSTANDARD2.0, ce sont des champs <code>static readonly</code> compilés au premier accès.
