  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Functional
  summary: >-
    Retourne une version mémoïsée de <code class="paramref">fn</code> sans argument,

    garantissant que la fonction n'est exécutée qu'une seule fois.
  remarks: >-
    <p>

    Contrairement aux surcharges avec arguments, aucun dictionnaire n'est nécessaire —

    le résultat est unique et stocké directement dans un <xref href="Rotomeca.Core.Optionals.MayBe%601" data-throw-if-not-resolved="false"></xref>.

    C'est essentiellement un pattern de <b>lazy singleton</b>.

    </p>

    <p>

    Ne pas utiliser avec des fonctions impures (<code>DateTime.Now</code>, <code>Random</code>,

    effets de bord) : le premier résultat sera retourné indéfiniment.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">var getConfig = Function.Memoize(() =&gt; LoadConfigFromDisk());

    getConfig(); // chargement effectué, résultat mis en cache

    getConfig(); // retourné depuis le cache, LoadConfigFromDisk() n'est plus appelé</code></pre>
  syntax:
    content: public static Func<TResult> Memoize<TResult>(Func<TResult> fn)
    parameters:
    - id: fn
      type: System.Func{{TResult}}
      description: Fonction pure sans argument à mémoïser.
    typeParameters:
    - id: TResult
      description: Type du résultat retourné par <code class="paramref">fn</code>.
    return:
      type: System.Func{{TResult}}
      description: >-
        Une nouvelle fonction qui retourne le résultat mis en cache dès le deuxième appel,

        sans réexécuter <code class="paramref">fn</code>.
    content.vb: Public Shared Function Memoize(Of TResult)(fn As Func(Of TResult)) As Func(Of TResult)
