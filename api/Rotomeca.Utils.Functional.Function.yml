  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Functional
  summary: >-
    Retarde l'exécution d'une action jusqu'à ce qu'un délai se soit écoulé

    sans nouvel appel. Chaque appel remet le timer à zéro.
  remarks: >-
    <p>

    Utile pour limiter les appels sur des événements haute fréquence

    comme la saisie dans un champ de recherche ou le redimensionnement d'une fenêtre.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">Action onSearch = Function.Debounce(() =&gt; FetchResults(), 300);

    // Chaque frappe remet le timer à zéro — FetchResults n'est appelé

    // qu'après 300ms sans nouvelle frappe.</code></pre>
  syntax:
    content: public static Action Debounce(Action action, uint ms)
    parameters:
    - id: action
      type: System.Action
      description: Action à exécuter après le délai.
    - id: ms
      type: System.UInt32
      description: Délai en millisecondes avant l'exécution de <code class="paramref">action</code>.
    return:
      type: System.Action
      description: Une nouvelle <xref href="System.Action" data-throw-if-not-resolved="false"></xref> qui diffère l'appel à <code class="paramref">action</code>.
    content.vb: Public Shared Function Debounce(action As Action, ms As UInteger) As Action
