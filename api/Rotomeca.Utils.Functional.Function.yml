  remarks: >-
    <p>

    Délègue à <code>_Once&lt;TArg1, Unit, Unit, TResult&gt;</code> en passant des arguments

    <xref href="Rotomeca.Utils.Functional.Unit" data-throw-if-not-resolved="false"></xref> (struct vide) pour les positions inutilisées.

    Le JIT élimine ces paramètres fantômes — surcoût nul à l'appel.

    </p>

    <p>

    Les deux closures de wrapping (<code>(a,_,_) =&gt; fn(a)</code> et <code>a =&gt; inner(a, default, default)</code>)

    sont allouées <b>une seule fois</b> lors de l'appel à <code>Once(fn)</code>, jamais lors des invocations.

    </p>
