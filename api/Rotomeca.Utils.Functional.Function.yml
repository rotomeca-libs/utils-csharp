    id: Memoize
    path: Rotomeca.Utils.Core/Functional/Function.Memoize.cs
    startLine: 215
  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Functional
  summary: >-
    Retourne une version mémoïsée de <code class="paramref">fn</code> qui met en cache

    ses résultats selon les 2 arguments reçus.
  remarks: >-
    <p>

    Le cache est thread-safe — implémenté via <xref href="System.Collections.Concurrent.ConcurrentDictionary%602" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    Les arguments sont combinés en un tuple struct comme clé,

    garantissant l'absence d'allocation heap par appel et satisfaisant nativement

    la contrainte <code>notnull</code> du dictionnaire — même si les arguments individuels

    sont <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.

    </p>

    <p>

    Sur <code>netstandard2.0</code> et <code>netstandard2.1</code>, chaque argument est encapsulé

    dans <xref href="Rotomeca.Core.Optionals.MayBe%601" data-throw-if-not-resolved="false"></xref> pour un support uniforme des valeurs <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.

    </p>

    <p>

    Le cache est illimité — ne pas utiliser avec un grand nombre de combinaisons

    d'arguments distinctes sous peine de pression mémoire.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">var add = Function.Memoize((int a, int b) =&gt; a + b);

    add(1, 2); // calcul effectué, résultat mis en cache

    add(1, 2); // retourné depuis le cache

    add(1, 3); // nouveau calcul</code></pre>
  syntax:
    content: public static Func<TArg1, TArg2, TResult> Memoize<TArg1, TArg2, TResult>(Func<TArg1, TArg2, TResult> fn)
    parameters:
    - id: fn
      type: System.Func{{TArg1},{TArg2},{TResult}}
      description: Fonction pure à mémoïser.
    typeParameters:
    - id: TArg1
      description: Type du premier argument de <code class="paramref">fn</code>.
    - id: TArg2
      description: Type du deuxième argument de <code class="paramref">fn</code>.
    - id: TResult
      description: Type du résultat retourné par <code class="paramref">fn</code>.
    return:
      type: System.Func{{TArg1},{TArg2},{TResult}}
      description: >-
        Une nouvelle fonction qui retourne le résultat depuis le cache si la combinaison

