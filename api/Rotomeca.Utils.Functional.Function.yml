  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Functional
  summary: Retourne une version de <code class="paramref">fn</code> qui ne s'exécute qu'une seule fois.
  remarks: >-
    <p>

    Implémenté via <xref href="System.Lazy%601" data-throw-if-not-resolved="false"></xref> avec <xref href="System.Threading.LazyThreadSafetyMode.ExecutionAndPublication" data-throw-if-not-resolved="false"></xref> —

    thread-safe et libère automatiquement la référence à <code class="paramref">fn</code> après le premier appel.

    </p>

    <p>

    Contrairement à <xref href="Rotomeca.Utils.Functional.Function.Memoize%60%601(System.Func%7b%60%600%7d)" data-throw-if-not-resolved="false"></xref> qui partage la même sémantique

    pour les fonctions sans argument, <xref href="Rotomeca.Utils.Functional.Function.Once%60%601(System.Func%7b%60%600%7d)" data-throw-if-not-resolved="false"></xref> est l'expression d'une intention

    différente : initialisation unique plutôt que mise en cache de résultats.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">var initApp = Function.Once(() =&gt; {
        Console.WriteLine("Initialisation...");
        return CreateApp();
    });


    initApp(); // exécute fn → "Initialisation..."

    initApp(); // retourne le même résultat, fn n'est plus appelée</code></pre>
  syntax:
    content: public static Func<TResult> Once<TResult>(Func<TResult> fn)
    parameters:
    - id: fn
      type: System.Func{{TResult}}
      description: Fonction à n'exécuter qu'une seule fois.
    typeParameters:
    - id: TResult
      description: Type du résultat retourné par <code class="paramref">fn</code>.
    return:
      type: System.Func{{TResult}}
      description: >-
        Une nouvelle fonction qui délègue à <code class="paramref">fn</code> uniquement au premier appel,

        puis retourne le résultat mis en cache pour tous les appels suivants.
    content.vb: Public Shared Function Once(Of TResult)(fn As Func(Of TResult)) As Func(Of TResult)
