  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Functional
  summary: >-
    Garantit qu'une action ne s'exécute pas plus d'une fois par tranche

    de temps donnée, quel que soit le nombre d'appels reçus.
  remarks: >-
    <p>

    Contrairement à <xref href="Rotomeca.Utils.Functional.Function.Debounce(System.Action%2cSystem.UInt32)" data-throw-if-not-resolved="false"></xref>, le premier appel s'exécute immédiatement.

    Les appels suivants sont ignorés jusqu'à l'expiration de l'intervalle.

    </p>

    <p>

    Sur .NET 5 et supérieur, utilise <xref href="System.Nullable%601" data-throw-if-not-resolved="false"></xref> nativement.

    Sur <code>netstandard2.0</code> et <code>netstandard2.1</code>, utilise <xref href="Rotomeca.Core.Optionals.MayBe%601" data-throw-if-not-resolved="false"></xref>

    en raison de comportements incompatibles/étranges avec <xref href="System.Nullable%601" data-throw-if-not-resolved="false"></xref> sur ces targets.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">Action onScroll = Function.Throttle(() =&gt; UpdateScrollbar(), 100);

    // UpdateScrollbar ne s'exécute qu'une fois toutes les 100ms,

    // même si l'événement scroll se déclenche des centaines de fois.</code></pre>
  syntax:
    content: public static Action Throttle(Action action, uint ms)
    parameters:
    - id: action
      type: System.Action
      description: Action dont la fréquence d'exécution est à limiter.
    - id: ms
      type: System.UInt32
      description: Intervalle minimal en millisecondes entre deux exécutions.
    return:
      type: System.Action
      description: Une nouvelle <xref href="System.Action" data-throw-if-not-resolved="false"></xref> dont la fréquence d'appel est limitée.
    content.vb: Public Shared Function Throttle(action As Action, ms As UInteger) As Action
  overload: Rotomeca.Utils.Functional.Function.Throttle*
