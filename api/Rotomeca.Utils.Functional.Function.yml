    id: Memoize
    path: Rotomeca.Utils.Core/Functional/Function.Memoize.cs
    startLine: 161
  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Functional
  summary: >-
    Retourne une version mémoïsée de <code class="paramref">fn</code> qui met en cache

    ses résultats selon l'argument reçu.
  remarks: >-
    <p>

    Le cache est thread-safe — implémenté via <xref href="System.Collections.Concurrent.ConcurrentDictionary%602" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    Les arguments <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> sont supportés et mis en cache séparément

    du dictionnaire principal.

    </p>

    <p>

    Ne pas utiliser avec des fonctions impures (<code>DateTime.Now</code>, <code>Random</code>,

    effets de bord) : le cache retournerait indéfiniment le premier résultat obtenu.

    </p>

    <p>

    Le cache est illimité — ne pas utiliser avec un nombre élevé de valeurs d'entrées

    distinctes sous peine de pression mémoire.

    </p>

    <p>

    Sur .NET 5 et supérieur, l'argument <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> est géré via un tableau

    dédié d'un élément, et les clés non nulles sont stockées directement dans le

    <xref href="System.Collections.Concurrent.ConcurrentDictionary%602" data-throw-if-not-resolved="false"></xref> sans surcoût de wrapping.

    Sur <code>netstandard2.0</code> et <code>netstandard2.1</code>, toutes les clés — y compris

    <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> — sont encapsulées dans <xref href="Rotomeca.Core.Optionals.MayBe%601" data-throw-if-not-resolved="false"></xref> via

    <code>GetOrAddLegacy</code>.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">var expensiveCalc = Function.Memoize((int n) =&gt; Fibonacci(n));

    expensiveCalc(40); // calcul effectué, résultat mis en cache

    expensiveCalc(40); // retourné depuis le cache

    expensiveCalc(41); // nouveau calcul</code></pre>
  syntax:
    content: public static Func<TArg1, TResult> Memoize<TArg1, TResult>(Func<TArg1, TResult> fn)
    parameters:
    - id: fn
      type: System.Func{{TArg1},{TResult}}
      description: Fonction pure à mémoïser.
    typeParameters:
    - id: TArg1
      description: Type de l'argument de <code class="paramref">fn</code>.
    - id: TResult
      description: Type du résultat retourné par <code class="paramref">fn</code>.
    return:
      type: System.Func{{TArg1},{TResult}}
      description: >-
        Une nouvelle fonction qui retourne le résultat depuis le cache si l'argument

        a déjà été rencontré, ou invoque <code class="paramref">fn</code> et met le résultat en cache sinon.
    content.vb: Public Shared Function Memoize(Of TArg1, TResult)(fn As Func(Of TArg1, TResult)) As Func(Of TArg1, TResult)
