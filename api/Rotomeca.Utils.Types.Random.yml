  namespace: Rotomeca.Utils.Types
  summary: >-
    Génère une chaîne aléatoire composée de caractères tirés du Plan Multilingue de Base (BMP) Unicode,

    couvrant l'intégralité des points de code U+0000 à U+FFFF, à l'exclusion des surrogates.
  remarks: >-
    <p>

    Les surrogates (U+D800–U+DFFF) sont exclus car ils ne sont pas des caractères Unicode valides seuls.

    L'espace valide couvre 63 488 caractères : U+0000–U+D7FF et U+E000–U+FFFF.

    </p>

    <p>

    Chaque caractère généré occupe exactement un <xref href="System.Char" data-throw-if-not-resolved="false"></xref> en mémoire.

    La longueur de la chaîne retournée est donc toujours égale à <code class="paramref">size</code>.

    </p>
  example: []
  syntax:
    content: public static string RandomStringBMP(uint size, int? seed = null)
    parameters:
    - id: size
      type: System.UInt32
      description: Nombre de caractères à générer.
    - id: seed
      type: System.Nullable{System.Int32}
      description: Graine optionnelle pour une séquence reproductible.
    return:
      type: System.String
      description: Une chaîne de longueur <code class="paramref">size</code> composée de caractères BMP valides.
    content.vb: Public Shared Function RandomStringBMP(size As UInteger, seed As Integer? = Nothing) As String
