  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Types
  summary: >-
    Génère une chaîne aléatoire composée de caractères tirés de l'intégralité

    de l'espace Unicode (U+0000 à U+10FFFF), à l'exclusion des surrogates.
  remarks: >-
    <p>

    Les surrogates (U+D800–U+DFFF) sont exclus. L'espace valide couvre 1 112 064 scalaires :

    U+0000–U+D7FF et U+E000–U+10FFFF.

    </p>

    <p>

    Les points de code au-delà de U+FFFF (plans supplémentaires : emojis, caractères historiques, etc.)

    sont encodés en UTF-16 sous forme de paires surrogate, ce qui signifie que la longueur

    de la chaîne en <xref href="System.Char" data-throw-if-not-resolved="false"></xref> peut être supérieure à <code class="paramref">size</code>.

    </p>

    <p>

    <xref href="System.Char.ConvertFromUtf32(System.Int32)" data-throw-if-not-resolved="false"></xref> est utilisé pour garantir la compatibilité avec

    NETSTANDARD2.0 sans dépendance à <code>System.Text.Rune</code>.

    </p>
  example: []
  syntax:
    content: public static string RandomStringUnicode(uint size, int? seed = null)
    parameters:
    - id: size
      type: System.UInt32
      description: Nombre de points de code (scalaires Unicode) à générer.
    - id: seed
      type: System.Nullable{System.Int32}
      description: Graine optionnelle pour une séquence reproductible.
    return:
      type: System.String
      description: >-
        Une chaîne composée de <code class="paramref">size</code> scalaires Unicode valides.

        Sa longueur en <xref href="System.Char" data-throw-if-not-resolved="false"></xref> peut dépasser <code class="paramref">size</code>

        si des caractères hors-BMP sont générés.
    content.vb: Public Shared Function RandomStringUnicode(size As UInteger, seed As Integer? = Nothing) As String
