    id: RandomString
    path: Rotomeca.Utils.Core/Types/Random.cs
    startLine: 194
  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Types
  summary: Génère une chaîne aléatoire composée de lettres minuscules de l'alphabet latin (a–z).
  remarks: >-
    Si une graine est fournie, elle est transmise à chaque appel de <code>Range</code> dans la boucle.

    La protection anti-double-seed d'<xref href="Rotomeca.Utils.Types.Random.UpdateSeed(System.Int32)" data-throw-if-not-resolved="false"></xref> garantit que la réinitialisation

    n'a lieu qu'une seule fois, produisant une séquence déterministe reproductible.
  example: []
  syntax:
    content: public static string RandomString(uint size, int? seed = null)
    parameters:
    - id: size
      type: System.UInt32
      description: Longueur de la chaîne à générer.
    - id: seed
      type: System.Nullable{System.Int32}
      description: Graine optionnelle pour une séquence reproductible.
