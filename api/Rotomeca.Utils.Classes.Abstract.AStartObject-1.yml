  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Classes.Abstract
  summary: 'Classe de base abstraite fournissant un cycle de vie structuré : initialisation puis exécution.'
  remarks: >-
    <p>

    Les sous-classes doivent surcharger <xref href="Rotomeca.Utils.Classes.Abstract.AStartObject%601._p_Init(System.Object%5b%5d)" data-throw-if-not-resolved="false"></xref> et <xref href="Rotomeca.Utils.Classes.Abstract.AStartObject%601._p_Main" data-throw-if-not-resolved="false"></xref> pour injecter

    leur logique métier. Le cycle de vie est déclenché via la méthode statique <xref href="Rotomeca.Utils.Classes.Abstract.AStartObject%601.Start(System.Object%5b%5d)" data-throw-if-not-resolved="false"></xref>,

    seul point d'entrée prévu pour instancier un <code>AStartObject</code>.

    </p>

    <p>

    Nécessite .NET 7+ (C# 11) pour le support des membres statiques abstraits en interface.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">class MyService : AStartObject&lt;MyService&gt;

    {
        private int _port;

        protected override void _p_Init(params object[] args)
            =&gt; _port = (int)args[0];

        protected override void _p_Main()
            =&gt; Console.WriteLine($"Listening on port {_port}");
    }


    MyService.Start(3000);

    // Output : Listening on port 3000</code></pre>
  syntax:
