  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Classes.Abstract
  summary: >-
    Méthode de fabrique statique : instancie la sous-classe concrète, exécute son cycle

    de vie complet et retourne l'instance prête à l'emploi.
  remarks: >-
    <p>C'est le <b>seul point d'entrée</b> prévu pour créer un <code>AStartObject</code>.</p>


    Les étapes sont, dans l'ordre :


    <ol><li>Instanciation de <code class="typeparamref">TSelf</code> via <xref href="System.Activator.CreateInstance(System.Type%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> (constructeur protégé).</li><li>Appel de <code>Init(args)</code> → dispatche vers <xref href="Rotomeca.Utils.Classes.Abstract.AStartObject%601._p_Init(System.Object%5b%5d)" data-throw-if-not-resolved="false"></xref>.</li><li>Appel de <code>Main()</code> → dispatche vers <xref href="Rotomeca.Utils.Classes.Abstract.AStartObject%601._p_Main" data-throw-if-not-resolved="false"></xref>.</li><li>Retour de l'instance complètement initialisée.</li></ol>
  example: []
  syntax:
    content: static TSelf Start(params object[] args)
    parameters:
    - id: args
      type: System.Object[]
      description: Arguments transmis à <xref href="Rotomeca.Utils.Classes.Abstract.AStartObject%601._p_Init(System.Object%5b%5d)" data-throw-if-not-resolved="false"></xref> de la sous-classe.
    return:
      type: '{TSelf}'
      description: Une instance complètement initialisée de <code class="typeparamref">TSelf</code>.
    content.vb: Shared Function Start(ParamArray args As Object()) As TSelf
