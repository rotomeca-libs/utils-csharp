  summary: Représente une chaîne de caractères vide (<code>""</code>).
  remarks: >-
    <p>

    Analogue à <xref href="System.String.Empty" data-throw-if-not-resolved="false"></xref>, fourni pour assurer

    la cohérence avec les packages Rotomeca en TypeScript et PHP.

    </p>

    <p>

    Miroir TypeScript :

    <a href="https://github.com/Rotomeca/node-utils/blob/main/lib/constants.ts#L9">https://github.com/Rotomeca/node-utils/blob/main/lib/constants.ts#L9</a>

    </p>
