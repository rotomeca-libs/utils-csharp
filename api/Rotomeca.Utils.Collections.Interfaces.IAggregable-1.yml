  summary: Définit le contrat d'agrégation pour les types qui peuvent s'additionner entre eux.
  remarks: >-
    Utilisé comme contrainte de type dans les surcharges pre-.NET 7 de

    <code>Arrays.Sum</code>, en remplacement de <code>INumber&lt;T&gt;</code>

    qui n'est pas disponible sur NETSTANDARD2.0.
