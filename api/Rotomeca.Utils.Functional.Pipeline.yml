  summary: Crée un nouveau pipeline à partir d'une valeur initiale.
  example:
  - >-
    <pre><code class="lang-csharp">string result = Pipeline.Start("  hello world  ")
                            .Pipe(s =&gt; s.Trim())
                            .Pipe(s =&gt; s.ToUpper());
    // result == "HELLO WORLD"</code></pre>
  syntax:
