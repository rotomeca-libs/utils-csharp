  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Functional
  summary: Point d'entrée du pattern de pipeline fonctionnel.
  remarks: >-
    Permet de construire un pipeline d'opérations de manière fluente

    en enchaînant des appels à <xref href="Rotomeca.Utils.Functional.PipeObject%601.Pipe%60%601(System.Func%7b%600%2c%60%600%7d)" data-throw-if-not-resolved="false"></xref>.


    <p>

    Syntaxe cross-langage (C# et TypeScript) :


    <pre><code class="lang-csharp">Pipeline.Start("hello")
            .Pipe(s =&gt; s.ToUpper())
            .Pipe(s =&gt; s.Trim());</code></pre>
    </p>

    <p>

    Pour une syntaxe plus idiomatique en C#, préférez l'extension

    <xref href="Rotomeca.Utils._____StPipeExtensions.Pipe%60%602(%60%600%2cSystem.Func%7b%60%600%2c%60%601%7d)" data-throw-if-not-resolved="false"></xref> :


    <pre><code class="lang-csharp">"hello".Pipe(s =&gt; s.ToUpper())
           .Pipe(s =&gt; s.Trim());</code></pre>
    </p>
  example: []
