  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Collections
  summary: >-
    Retourne un tableau ne contenant que des éléments distincts,

    en se basant sur une clé extraite par <code class="paramref">fn</code>.

    En cas de doublons, le premier élément rencontré est conservé.
  example:
  - >-
    <pre><code class="lang-csharp">var people = new[] {
        new Person("Alice", 30),
        new Person("Bob",   25),
        new Person("Alice", 42),
    };


    Person[] unique = Array.UniqueBy(people, p =&gt; p.Name);

    // unique =&gt; [{ "Alice", 30 }, { "Bob", 25 }]</code></pre>
  syntax:
    content: 'public static RArray<T> UniqueBy<T, TResult>(this IEnumerable<T> original, Func<T, TResult> fn) where TResult : notnull'
    parameters:
    - id: original
      type: System.Collections.Generic.IEnumerable{{T}}
      description: Le tableau source.
    - id: fn
      type: System.Func{{T},{TResult}}
      description: Fonction qui extrait la clé de comparaison depuis un élément.
    typeParameters:
    - id: T
      description: Le type des éléments du tableau.
    - id: TResult
      description: >-
        Le type de la clé utilisée pour comparer les éléments.

        Doit être non-nullable.
    return:
      type: Rotomeca.Core.Collections.RArray{{T}}
      description: Un nouveau tableau contenant uniquement les éléments dont la clé est unique.
    content.vb: Public Shared Function UniqueBy(Of T, TResult)(original As IEnumerable(Of T), fn As Func(Of T, TResult)) As RArray(Of T)
