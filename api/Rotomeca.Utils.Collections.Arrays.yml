  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Collections
  summary: >-
    Divise un tableau en plusieurs sous-tableaux (chunks) d'une taille donnée.

    Le dernier chunk peut être plus petit si la taille du tableau n'est pas

    un multiple de <code class="paramref">size</code>.
  example:
  - >-
    <pre><code class="lang-csharp">int[] source = [1, 2, 3, 4, 5];

    int[][] chunks = Array.Chunck(source, 2);

    // chunks =&gt; [[1, 2], [3, 4], [5]]</code></pre>
  syntax:
    content: public static RArray<RArray<T>> Chunk<T>(this RArray<T> original, uint size)
    parameters:
    - id: original
      type: Rotomeca.Core.Collections.RArray{{T}}
      description: Le tableau source à découper.
    - id: size
      type: System.UInt32
      description: La taille maximale de chaque chunk.
    typeParameters:
    - id: T
      description: Le type des éléments du tableau.
    return:
      type: Rotomeca.Core.Collections.RArray{Rotomeca.Core.Collections.RArray{{T}}}
      description: >-
        Un tableau de sous-tableaux de type <code class="typeparamref">T</code>.

        Retourne un tableau vide si <code class="paramref">size</code> vaut 0.
    content.vb: Public Shared Function Chunk(Of T)(original As RArray(Of T), size As UInteger) As RArray(Of RArray(Of T))
