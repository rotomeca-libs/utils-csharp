    path: Rotomeca.Utils.Core/Collection/Arrays.cs
    startLine: 158
  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Collections
  summary: >-
    Regroupe les éléments d'une séquence par une clé extraite via <code class="paramref">fn</code>,

    et retourne un dictionnaire associant chaque clé à un tableau des éléments correspondants.
  example:
  - >-
    <pre><code class="lang-csharp">var words = new[] { "apple", "avocado", "banana", "blueberry" };

    var byLetter = words.GroupTo(w =&gt; w[0]);

    // byLetter['a'] =&gt; ["apple", "avocado"]

    // byLetter['b'] =&gt; ["banana", "blueberry"]</code></pre>
  syntax:
    content: 'public static Dictionary<TKey, RArray<T>> GroupTo<TKey, T>(this IEnumerable<T> original, Func<T, TKey> fn) where TKey : notnull'
    parameters:
    - id: original
      type: System.Collections.Generic.IEnumerable{{T}}
      description: La séquence source à regrouper.
    - id: fn
      type: System.Func{{T},{TKey}}
      description: Fonction qui extrait la clé de regroupement depuis un élément.
    typeParameters:
    - id: TKey
      description: Le type de la clé de regroupement. Doit être non-nullable.
    - id: T
      description: Le type des éléments de la séquence.
    return:
      type: System.Collections.Generic.Dictionary{{TKey},Rotomeca.Core.Collections.RArray{{T}}}
      description: >-
        Un dictionnaire où chaque clé est associée à un <xref href="Rotomeca.Core.Collections.RArray%601" data-throw-if-not-resolved="false"></xref>

        contenant tous les éléments du groupe correspondant.
    content.vb: Public Shared Function GroupTo(Of TKey, T)(original As IEnumerable(Of T), fn As Func(Of T, TKey)) As Dictionary(Of TKey, RArray(Of T))
  overload: Rotomeca.Utils.Collections.Arrays.GroupTo*
