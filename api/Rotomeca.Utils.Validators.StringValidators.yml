  summary: Vérifie que la chaîne respecte le format minimal d'une adresse email.
  remarks: >-
    Validation intentionnellement permissive — ne couvre pas l'intégralité de la RFC 5322.

    Pour une validation stricte, préférer une vérification côté serveur ou un envoi de confirmation.
  example: []
  syntax:
    content: public static bool IsEmail(this string str)
    parameters:
    - id: str
      type: System.String
      description: La chaîne à valider.
    return:
      type: System.Boolean
      description: <code>true</code> si la chaîne ressemble à une adresse email valide ; <code>false</code> sinon.
