  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Functional
  summary: Termine le pipeline et retourne la valeur encapsulée.
  remarks: >-
    Équivalent à un cast implicite vers <code class="typeparamref">T</code>.

    Préférez la conversion implicite lorsque le contexte le permet,

    et réservez <xref href="Rotomeca.Utils.Functional.PipeObject%601.Unpipe" data-throw-if-not-resolved="false"></xref> aux cas où le type cible est ambigu.
  example:
  - >-
    <pre><code class="lang-csharp">int result = Pipeline.Start("hello world")
                         .Pipe(s =&gt; s.Split(' '))
                         .Pipe(words =&gt; words.Length)
                         .Unpipe(); // 2</code></pre>
  syntax:
