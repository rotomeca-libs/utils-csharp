  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Functional
  summary: >-
    Applique une fonction de transformation à la valeur courante

    et retourne un nouveau <xref href="Rotomeca.Utils.Functional.PipeObject%601" data-throw-if-not-resolved="false"></xref> contenant le résultat.
  example:
  - >-
    <pre><code class="lang-csharp">var result = Pipeline.Start(42)
                         .Pipe(n =&gt; n * 2)   // PipeObject&lt;int&gt;(84)
                         .Pipe(n =&gt; $"{n}"); // PipeObject&lt;string&gt;("84")</code></pre>
