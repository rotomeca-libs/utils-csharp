  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Functional
  summary: >-
    Encapsule une valeur dans un pipeline fonctionnel permettant

    d'enchaîner des transformations de manière fluente.
  remarks: >-
    <p>

    Cette classe est à usage interne — elle est retournée par

    <xref href="Rotomeca.Utils.Functional.Pipeline.Start%60%601(%60%600)" data-throw-if-not-resolved="false"></xref> et par chaque appel à <xref href="Rotomeca.Utils.Functional.PipeObject%601.Pipe%60%601(System.Func%7b%600%2c%60%600%7d)" data-throw-if-not-resolved="false"></xref>.

    Le consommateur interagit avec elle via ces deux points d'entrée.

    </p>

    <p>

    La conversion implicite vers <code class="typeparamref">T</code> permet de récupérer

    la valeur finale sans appel explicite à <xref href="Rotomeca.Utils.Functional.PipeObject%601.Unpipe" data-throw-if-not-resolved="false"></xref> :


    <pre><code class="lang-csharp">string result = Pipeline.Start("hello").Pipe(s =&gt; s.ToUpper());

    // Équivalent à :

    string result = Pipeline.Start("hello").Pipe(s =&gt; s.ToUpper()).Unpipe();</code></pre>

    </p>
