  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Types
  summary: >-
    Représente un objet dynamique à la manière d'un objet JavaScript :

    collection de propriétés nommées (<code>string</code>) à valeurs de types quelconques.
  remarks: >-
    <p>

    Supporte la syntaxe pointée via <code>dynamic</code> :


    <pre><code class="lang-csharp">dynamic obj = new JsObject { ["a"] = 5 };

    obj.a = 58;</code></pre>

    </p>

    <p>

    Trois stratégies de cache sont employées :


    <ol><li>
        <b>Cache de types</b> : le <xref href="System.Type" data-throw-if-not-resolved="false"></xref> de chaque valeur est mémorisé à l'écriture,
        évitant tout appel à <code>GetType()</code> lors des accès typés.
      </li><li>
        <b>Cache de représentations string</b> : le résultat de <code>ToString()</code> est mémorisé
        par clé et invalidé uniquement à la prochaine écriture sur cette clé.
      </li><li>
        <b>Snapshot figé (NET8+)</b> : <code>Freeze</code> convertit le store interne en
        <code>FrozenDictionary</code>, optimisé pour les lectures intensives.
        Toute écriture ultérieure invalide automatiquement le snapshot.
      </li></ol>
    </p>
  example: []
  syntax:
    content: 'public class JsObject : DynamicObject, IDynamicMetaObjectProvider, IEnumerable<KeyValuePair<string, object?>>, IEnumerable'
    content.vb: Public Class JsObject Inherits DynamicObject Implements IDynamicMetaObjectProvider, IEnumerable(Of KeyValuePair(Of String, Object)), IEnumerable
