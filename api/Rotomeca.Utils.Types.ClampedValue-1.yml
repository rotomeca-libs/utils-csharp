  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Types
  summary: Valeur immuable contrainte dans un intervalle [<xref href="Rotomeca.Utils.Types.ClampedValue%601.Min" data-throw-if-not-resolved="false"></xref>, <xref href="Rotomeca.Utils.Types.ClampedValue%601.Max" data-throw-if-not-resolved="false"></xref>].
  remarks: >-
    <p>

    Implémenté en <code>readonly struct</code> — aucune allocation heap,

    sémantique par valeur, pas de GC.

    </p>

    <p>

    Toute tentative d'assigner une valeur hors intervalle est silencieusement

    clampée au minimum ou au maximum, jamais levée comme exception.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">var speed = new ClampedValue&lt;int&gt;(0, 100, 150);

    Console.WriteLine(speed.Value); // 100 — clampée au max


    var faster = speed.WithValue(80);

    Console.WriteLine(faster.Value); // 80


    int raw = speed; // conversion implicite → 100</code></pre>
