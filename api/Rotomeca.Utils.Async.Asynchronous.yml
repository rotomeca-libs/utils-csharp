  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Async
  summary: Planifie l'exécution d'une action après un délai donné, sans bloquer le thread courant.
  remarks: >-
    Équivalent de <code>setTimeout(fn, delay)</code> en JavaScript.

    Le callback est exécuté sur un thread du pool — évitez d'y accéder

    à des ressources non thread-safe sans synchronisation.
  example:
  - >-
    <pre><code class="lang-csharp">int id = Asynchronous.SetTimeout(() =&gt; Console.WriteLine("Déclenché !"), 2000);

    // ...

    Asynchronous.ClearTimeout(id); // Annulation si nécessaire</code></pre>
  syntax:
    content: public static int SetTimeout(Action fn, uint delay)
    parameters:
    - id: fn
      type: System.Action
      description: Action à exécuter à l'expiration du délai.
    - id: delay
      type: System.UInt32
      description: Délai en millisecondes avant l'exécution de <code class="paramref">fn</code>.
    return:
      type: System.Int32
      description: Identifiant unique du timeout, utilisable pour l'annuler via <xref href="Rotomeca.Utils.Async.Asynchronous.ClearTimeout(System.Int32)" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Shared Function SetTimeout(fn As Action, delay As UInteger) As Integer
