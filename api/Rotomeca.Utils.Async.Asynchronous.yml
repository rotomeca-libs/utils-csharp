  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Async
  summary: >-
    Exécute <code class="paramref">fn</code> de manière répétée jusqu'à ce qu'elle réussisse

    ou que le nombre maximal de tentatives soit atteint.
  remarks: >-
    Surcharge de convenance — convertit <code class="paramref">delay</code> en

    <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref> et délègue à

    <xref href="Rotomeca.Utils.Async.Asynchronous.Retry%60%601(System.Func%7bSystem.Threading.Tasks.Task%7b%60%600%7d%7d%2cRotomeca.Utils.Async.Helpers.AttemptNumber%2cSystem.TimeSpan%2cSystem.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public static Task<T> Retry<T>(Func<Task<T>> fn, AttemptNumber attempts, uint delay, CancellationToken cancellationToken = default)
    parameters:
    - id: fn
      type: System.Func{System.Threading.Tasks.Task{{T}}}
      description: Fonction asynchrone à exécuter.
    - id: attempts
      type: Rotomeca.Utils.Async.Helpers.AttemptNumber
      description: >-
        Nombre maximal de tentatives, garanti supérieur ou égal à 1

        via <xref href="Rotomeca.Utils.Async.Helpers.AttemptNumber" data-throw-if-not-resolved="false"></xref>.
    - id: delay
      type: System.UInt32
      description: Délai en millisecondes entre chaque tentative.
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: Token optionnel permettant d'interrompre les tentatives.
    typeParameters:
    - id: T
      description: Type du résultat retourné par <code class="paramref">fn</code>.
    return:
      type: System.Threading.Tasks.Task{{T}}
      description: Le résultat de <code class="paramref">fn</code> lors du premier appel réussi.
    content.vb: Public Shared Function Retry(Of T)(fn As Func(Of Task(Of T)), attempts As AttemptNumber, delay As UInteger, cancellationToken As CancellationToken = Nothing) As Task(Of T)
