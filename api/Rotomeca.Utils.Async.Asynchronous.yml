  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Async
  summary: Annule un timeout planifié avant son déclenchement.
  remarks: >-
    <p>

    Équivalent de <code>clearTimeout(id)</code> en JavaScript.

    </p>

    <p>

    Si l'identifiant est introuvable (timeout déjà déclenché ou invalide),

    la méthode ne fait rien et ne lève pas d'exception.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">int id = Asynchronous.SetTimeout(() =&gt; Console.WriteLine("Ne s'affichera pas"), 5000);

    Asynchronous.ClearTimeout(id);</code></pre>
  syntax:
    content: public static void ClearTimeout(int number)
    parameters:
    - id: number
      type: System.Int32
      description: Identifiant du timeout à annuler, retourné par <xref href="Rotomeca.Utils.Async.Asynchronous.SetTimeout(System.Action%2cSystem.UInt32)" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Shared Sub ClearTimeout(number As Integer)
