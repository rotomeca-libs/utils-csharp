  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Async
  summary: Exécute toutes les fonctions séquentiellement et retourne leurs résultats.
  remarks: >-
    <p>

    Chaque fonction est attendue avant d'exécuter la suivante — l'ordre

    d'exécution est garanti.

    </p>

    <p>

    Pour traiter les résultats au fur et à mesure plutôt qu'en bloc,

    préférez <xref href="Rotomeca.Utils.Async.Asynchronous.SequentialGenerator%60%601(System.Collections.Generic.IEnumerable%7bSystem.Func%7bSystem.Threading.Tasks.Task%7b%60%600%7d%7d%7d)" data-throw-if-not-resolved="false"></xref>

    avec <code>await foreach</code>.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">var results = await Asynchronous.Sequential(
        () =&gt; StepOneAsync(),
        () =&gt; StepTwoAsync(),
        () =&gt; StepThreeAsync()
    );</code></pre>
  syntax:
