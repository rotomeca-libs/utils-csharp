      description: >-
        Un tableau contenant les résultats dans le même ordre que <code class="paramref">fns</code>,

        disponible quand toutes les fonctions ont terminé.
    content.vb: Public Shared Function Sequential(Of T)(fns As IEnumerable(Of Func(Of Task(Of T)))) As Task(Of T())
