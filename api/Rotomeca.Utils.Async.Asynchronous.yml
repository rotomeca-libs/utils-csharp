  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Async
  summary: Exécute toutes les fonctions en parallèle et retourne leurs résultats.
  remarks: >-
    Toutes les tâches démarrent immédiatement et s'exécutent en parallèle.

    Si une tâche lève une exception, <xref href="System.Threading.Tasks.Task.WhenAll(System.Threading.Tasks.Task%5b%5d)" data-throw-if-not-resolved="false"></xref> regroupe

    toutes les exceptions dans une <xref href="System.AggregateException" data-throw-if-not-resolved="false"></xref>.
  example:
  - >-
    <pre><code class="lang-csharp">var results = await Asynchronous.Parallel(
        () =&gt; FetchUserAsync(1),
        () =&gt; FetchUserAsync(2),
        () =&gt; FetchUserAsync(3)
    );</code></pre>
  syntax:
    content: public static Task<T[]> Parallel<T>(params Func<Task<T>>[] tasks)
    parameters:
    - id: tasks
      type: System.Func{System.Threading.Tasks.Task{{T}}}[]
      description: Fonctions asynchrones à exécuter simultanément.
    typeParameters:
    - id: T
      description: Type du résultat de chaque fonction.
    return:
      type: System.Threading.Tasks.Task{{T}[]}
      description: >-
        Un tableau contenant les résultats dans le même ordre que <code class="paramref">tasks</code>,

        disponible quand toutes les fonctions ont terminé.
    content.vb: Public Shared Function Parallel(Of T)(ParamArray tasks As Func(Of Task(Of T))()) As Task(Of T())
