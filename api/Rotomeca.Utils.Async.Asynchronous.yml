  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Async
  summary: >-
    Retourne un flux asynchrone exécutant chaque fonction séquentiellement,

    en émettant les résultats au fur et à mesure.
  remarks: >-
    <p>

    Contrairement à <xref href="Rotomeca.Utils.Async.Asynchronous.Sequential%60%601(System.Collections.Generic.IEnumerable%7bSystem.Func%7bSystem.Threading.Tasks.Task%7b%60%600%7d%7d%7d)" data-throw-if-not-resolved="false"></xref>

    qui attend toutes les tâches avant de retourner, ce générateur permet

    de traiter chaque résultat dès sa disponibilité via <code>await foreach</code>.

    </p>

    <p>

    Sur <code>netstandard2.0</code>, utilise <xref href="Rotomeca.Utils.Async.Internal.AsyncEnumerable%601" data-throw-if-not-resolved="false"></xref>

    — implémentation manuelle sans dépendance externe.

    Sur les autres cibles, le compilateur génère une state machine optimisée.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">await foreach (var result in Asynchronous.SequentialGenerator(fns))
        Console.WriteLine(result);</code></pre>
  syntax:
    content: public static IAsyncEnumerable<T> SequentialGenerator<T>(IEnumerable<Func<Task<T>>> fns)
    parameters:
    - id: fns
      type: System.Collections.Generic.IEnumerable{System.Func{System.Threading.Tasks.Task{{T}}}}
      description: Fonctions asynchrones à exécuter dans l'ordre.
    typeParameters:
    - id: T
      description: Type du résultat de chaque fonction.
    return:
      type: System.Collections.Generic.IAsyncEnumerable{{T}}
      description: >-
        Un <xref href="System.Collections.Generic.IAsyncEnumerable%601" data-throw-if-not-resolved="false"></xref> émettant chaque résultat

        dès qu'il est disponible, sans attendre les suivants.
    content.vb: Public Shared Function SequentialGenerator(Of T)(fns As IEnumerable(Of Func(Of Task(Of T)))) As IAsyncEnumerable(Of T)
  overload: Rotomeca.Utils.Async.Asynchronous.SequentialGenerator*
