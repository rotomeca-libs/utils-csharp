  summary: Contraint une valeur dans un intervalle <code>[min, max]</code>.
  example:
  - >-
    <pre><code class="lang-csharp">10.Clamp(0, 5)   // → 5

    (-3).Clamp(0, 5) // → 0

    3.Clamp(0, 5)    // → 3</code></pre>
