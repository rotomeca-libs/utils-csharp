  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Numerics
  summary: Calcule la moyenne arithmétique d'un <xref href="Rotomeca.Core.Collections.RArray%601" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    L'accumulation et la division sont effectuées en <xref href="System.Double" data-throw-if-not-resolved="false"></xref> pour tous les types,

    ce qui évite les débordements et la division entière pour les types entiers (<code>int</code>, <code>long</code>, etc.).

    Chaque élément est converti via <code>CreateSaturating</code> : aucune exception n'est levée,

    mais une perte de précision peut survenir pour les grands <code>ulong</code> ou pour <code>decimal</code>.
  example:
  - >-
    <pre><code class="lang-csharp">new RArray&lt;double&gt; { 1, 2, 3, 4 }.Average() // → 2.5

    new RArray&lt;int&gt; { 1, 2 }.Average()          // → 1.5

    new RArray&lt;double&gt; { }.Average()            // → 0.0</code></pre>
  syntax:
    content: 'public static double Average<T>(this RArray<T> arr) where T : INumber<T>'
    parameters:
    - id: arr
      type: Rotomeca.Core.Collections.RArray{{T}}
      description: Le tableau de valeurs.
    typeParameters:
    - id: T
      description: Type numérique implémentant <xref href="System.Numerics.INumber%601" data-throw-if-not-resolved="false"></xref>.
    return:
      type: System.Double
      description: >-
        La moyenne sous forme de <xref href="System.Double" data-throw-if-not-resolved="false"></xref>,

        ou <code>0.0</code> si le tableau est vide.
    content.vb: Public Shared Function Average(Of T As INumber(Of T))(arr As RArray(Of T)) As Double
