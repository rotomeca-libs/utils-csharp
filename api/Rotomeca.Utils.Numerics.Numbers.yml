  summary: Détermine si une valeur est comprise dans un intervalle <code>[min, max]</code> (bornes incluses).
  example:
  - >-
    <pre><code class="lang-csharp">3.IsInRange(1, 5) // → true

    6.IsInRange(1, 5) // → false

    1.IsInRange(1, 5) // → true  (borne incluse)</code></pre>
  syntax:
    content: 'public static bool IsInRange<T>(this T number, T min, T max) where T : IComparable<T>'
    parameters:
    - id: number
      type: '{T}'
      description: La valeur à tester.
    - id: min
      type: '{T}'
      description: Borne inférieure inclusive.
    - id: max
      type: '{T}'
      description: Borne supérieure inclusive.
    typeParameters:
    - id: T
      description: Tout type implémentant <xref href="System.IComparable%601" data-throw-if-not-resolved="false"></xref>.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> si <code class="paramref">min</code> ≤ <code class="paramref">number</code> ≤ <code class="paramref">max</code> ;

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> sinon.
