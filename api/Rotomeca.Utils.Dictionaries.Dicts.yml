  namespace: Rotomeca.Utils.Dictionaries
  summary: >-
    Reconstruit un dictionnaire imbriqué à partir d'un dictionnaire plat

    dont les clés encodent la profondeur via un séparateur.

    Opération inverse de <xref href="Rotomeca.Utils.Dictionaries.Dicts.FlattenObject(System.Collections.Generic.IDictionary%7bSystem.String%2cSystem.Object%7d%2cSystem.String)" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Si une clé intermédiaire existe déjà avec une valeur qui n'est pas un dictionnaire,

    elle est écrasée par un nouveau dictionnaire.
  example:
  - >-
    <pre><code class="lang-csharp">// { "a.b.c": 1 } → { "a": { "b": { "c": 1 } } }

    var nested = flat.UnflattenObject();</code></pre>
