    id: DeepClone
    path: Rotomeca.Utils.Core/Dictionnaries/Dicts.cs
    startLine: 184
  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Dictionaries
  summary: Effectue un clonage profond de l'objet.
  remarks: >-
    <p>

    Sur .NET 5+ : utilise la réflexion pour parcourir tous les champs (y compris privés et hérités),

    avec détection des références circulaires. En cas d'échec, bascule automatiquement

    sur un clonage JSON (voir <code>JsonClone</code>).

    </p>

    <p>

    Sur .NET Standard 2.0 : utilise uniquement la réflexion, sans fallback JSON.

    </p>
  example: []
  syntax:
    content: public static T DeepClone<T>(this T obj, Action<string>? logger = null)
    parameters:
    - id: obj
      type: '{T}'
      description: L'objet à cloner.
    - id: logger
      type: System.Action{System.String}
      description: >-
        Action de journalisation appelée en cas de fallback JSON.

        Par défaut : écriture sur <xref href="System.Console.Error" data-throw-if-not-resolved="false"></xref>.
    typeParameters:
    - id: T
      description: Le type de l'objet à cloner.
    return:
      type: '{T}'
      description: Un clone profond de <code class="paramref">obj</code>.
    content.vb: Public Shared Function DeepClone(Of T)(obj As T, logger As Action(Of String) = Nothing) As T
