  assemblies:
  - Rotomeca.Utils.Core
  namespace: Rotomeca.Utils.Dictionaries
  summary: >-
    Fusionne profondément deux dictionnaires.

    Les entrées de <code class="paramref">source</code> sont fusionnées récursivement dans <code class="paramref">target</code>.

    En cas de conflit sur une clé, la valeur de <code class="paramref">source</code> est prioritaire,

    sauf si les deux valeurs sont elles-mêmes des dictionnaires, auquel cas la fusion est récursive.
  example: []
  syntax:
    content: 'public static IDictionary<TKey, TValue> DeepMerge<TKey, TValue>(this IDictionary<TKey, TValue> target, IDictionary<TKey, TValue> source) where TKey : notnull'
    parameters:
    - id: target
      type: System.Collections.Generic.IDictionary{{TKey},{TValue}}
      description: Le dictionnaire de base. N'est pas modifié.
    - id: source
      type: System.Collections.Generic.IDictionary{{TKey},{TValue}}
      description: Le dictionnaire à fusionner dans <code class="paramref">target</code>.
    typeParameters:
    - id: TKey
      description: Le type des clés.
    - id: TValue
      description: Le type des valeurs.
    return:
      type: System.Collections.Generic.IDictionary{{TKey},{TValue}}
      description: Un nouveau dictionnaire résultant de la fusion profonde.
    content.vb: Public Shared Function DeepMerge(Of TKey, TValue)(target As IDictionary(Of TKey, TValue), source As IDictionary(Of TKey, TValue)) As IDictionary(Of TKey, TValue)
