      type: System.Collections.Generic.IDictionary{{TKey},{TValue}}
      description: Le dictionnaire source.
    - id: keys
      type: '{TKey}[]'
      description: Les clés à conserver.
    typeParameters:
    - id: TKey
      description: Le type des clés.
    - id: TValue
      description: Le type des valeurs.
    return:
      type: System.Collections.Generic.IDictionary{{TKey},{TValue}}
      description: >-
        Un nouveau dictionnaire contenant uniquement les entrées dont la clé figure dans <code class="paramref">keys</code>.

        Retourne un dictionnaire vide si <code class="paramref">keys</code> est vide.
