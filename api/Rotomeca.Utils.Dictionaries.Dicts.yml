    Les clés absentes du dictionnaire source sont silencieusement ignorées.
  example: []
  syntax:
    content: 'public static IDictionary<TKey, TValue> Pick<TKey, TValue>(this IDictionary<TKey, TValue> obj, params TKey[] keys) where TKey : notnull'
    parameters:
